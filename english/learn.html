<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English — Обучение</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #4d96ff;
  --green: #6bcb77;
  --yellow: #ffd93d;
  --dark: #1a1a2e;
  --shadow: 0 8px 32px rgba(77,150,255,0.15);
  --radius: 24px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #c9edff 0%, #e8f7ff 50%, #fef9ec 100%);
  min-height: 100vh;
  padding-bottom: 40px;
  overflow-x: hidden;
}

/* CLOUDS */
.clouds { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.cloud { position: absolute; background: #fff; border-radius: 50px; opacity: 0.5; animation: floatCloud linear infinite; }
.cloud::before,.cloud::after { content:''; position:absolute; background:#fff; border-radius:50%; }
.cloud:nth-child(1){width:90px;height:28px;top:6%;animation-duration:32s;}
.cloud:nth-child(1)::before{width:40px;height:40px;top:-20px;left:14px;}
.cloud:nth-child(1)::after{width:28px;height:28px;top:-12px;left:42px;}
.cloud:nth-child(2){width:130px;height:38px;top:22%;animation-duration:48s;animation-delay:-14s;}
.cloud:nth-child(2)::before{width:58px;height:58px;top:-30px;left:18px;}
.cloud:nth-child(2)::after{width:40px;height:40px;top:-20px;left:64px;}
.cloud:nth-child(3){width:70px;height:22px;top:40%;animation-duration:36s;animation-delay:-7s;}
.cloud:nth-child(3)::before{width:30px;height:30px;top:-15px;left:12px;}
.cloud:nth-child(3)::after{width:22px;height:22px;top:-10px;left:32px;}
@keyframes floatCloud{from{transform:translateX(-220px)}to{transform:translateX(calc(100vw + 220px))}}

/* SCREENS */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }

/* ══ HOME ══ */
.home-header { text-align: center; padding: 32px 20px 16px; }
.home-header h1 { font-family: 'Fredoka One', cursive; font-size: 2.3rem; color: var(--primary); text-shadow: 0 3px 16px rgba(77,150,255,0.2); }
.home-header p { color: #6a8caf; font-size: 0.95rem; margin-top: 4px; font-weight: 600; }

.topics { padding: 0 14px; display: flex; flex-direction: column; gap: 12px; }
.topic-card {
  background: white; border-radius: var(--radius); padding: 18px 20px;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px;
  cursor: pointer; transition: transform 0.15s; border: 3px solid transparent;
}
.topic-card:active { transform: scale(0.97); }
.topic-card .emoji { font-size: 2.4rem; flex-shrink: 0; }
.topic-card .info { flex: 1; }
.topic-card .topic-name { font-weight: 900; font-size: 1.05rem; color: var(--dark); }
.topic-card .topic-meta { font-size: 0.8rem; color: #a0b8d0; font-weight: 700; margin-top: 2px; }
.topic-card .topic-done { font-size: 0.8rem; color: var(--green); font-weight: 800; margin-top: 3px; }

.all-card { background: linear-gradient(135deg, #667eea, #764ba2); border: none !important; }
.all-card .topic-name, .all-card .topic-meta { color: white; }
.all-card .topic-meta { color: rgba(255,255,255,0.8); }

/* ══ LEARN HEADER ══ */
.learn-header {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 16px 8px;
}
.back-btn {
  width: 42px; height: 42px; border-radius: 14px; border: none;
  background: white; box-shadow: var(--shadow); font-size: 1.2rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.learn-title-wrap { flex: 1; }
.learn-topic-name { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--primary); }
.learn-counter { font-size: 0.8rem; color: #a0b8d0; font-weight: 700; }

.prog-wrap { width: min(360px,92vw); background: #d6eaf8; border-radius:20px; height:8px; margin: 6px auto 10px; overflow:hidden; }
.prog-bar { height:100%; background: linear-gradient(90deg,var(--primary),var(--green)); border-radius:20px; transition:width 0.5s ease; }

/* ══ FLASHCARD ══ */
.card-scene { width: min(380px, 95vw); margin: 0 auto; perspective: 1000px; }

.flashcard {
  position: relative;
  background: white;
  border-radius: 28px;
  padding: 30px 24px 24px;
  box-shadow: 0 16px 56px rgba(77,150,255,0.18);
  text-align: center;
  animation: cardIn 0.45s cubic-bezier(.34,1.56,.64,1) both;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(40px) scale(0.93); }
  to   { opacity:1; transform: none; }
}

/* Word number badge */
.word-num {
  font-size: 0.8rem; font-weight: 800; color: #a0b8d0;
  background: #f0f6ff; border-radius: 20px; padding: 4px 14px;
  align-self: center; margin-bottom: 4px;
}

/* English word */
.card-en {
  font-family: 'Nunito', sans-serif;
  font-size: 3rem;
  font-weight: 900;
  color: var(--dark);
  letter-spacing: -1px;
  line-height: 1.1;
  margin: 4px 0 2px;
}

/* Translation */
.card-ru {
  font-size: 1.9rem;
  font-weight: 900;
  color: var(--primary);
  margin: 0 0 8px;
}

/* Divider */
.card-divider {
  width: 48px; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--green));
  border-radius: 10px;
  margin: 2px auto 8px;
}

/* Listen button */
.listen-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 4px 0 8px; }
.listen-btn {
  background: linear-gradient(135deg, #4d96ff, #38b6ff);
  border: none; border-radius: 50px; color: white;
  font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 800;
  padding: 10px 22px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(77,150,255,0.35);
  display: inline-flex; align-items: center; gap: 8px;
  transition: transform 0.15s;
}
.listen-btn:active { transform: scale(0.95); }
.listen-btn.playing { background: linear-gradient(135deg, #6bcb77, #38d9a9); }
.spk { font-size: 1.2rem; }
.listen-btn.playing .spk { animation: spk 0.5s ease infinite alternate; }
@keyframes spk { from{transform:scale(1)} to{transform:scale(1.3)} }

/* Step dots */
.step-dots {
  display: flex; gap: 8px; justify-content: center; margin: 8px 0 4px;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #d6eaf8; transition: background 0.3s;
}
.dot.active { background: var(--primary); }
.dot.done   { background: var(--green); }

/* Step panels */
.step-panel { display: none; width: 100%; }
.step-panel.active { display: block; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* Word + translation panel */
.word-block { text-align: center; padding: 4px 0 12px; }
.card-emoji { font-size: 3.5rem; display: block; margin-bottom: 8px; line-height: 1; }

/* Example sentence */
.example-box {
  background: #f0f6ff;
  border-radius: 16px;
  padding: 18px 18px;
  width: 100%;
  text-align: left;
}
.example-label {
  font-size: 0.72rem; font-weight: 900; color: #a0b8d0;
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
}
.example-en {
  font-size: 1.05rem; font-weight: 700; color: var(--dark); line-height: 1.5;
  margin-bottom: 8px;
}
.example-en b { color: var(--primary); }
.example-ru {
  font-size: 0.92rem; font-weight: 600; color: #6a8caf; line-height: 1.5;
}
.listen-again-row { text-align: center; margin-top: 14px; }

/* Navigation buttons */
.nav-row {
  display: flex; gap: 10px; width: 100%; margin-top: 16px;
}
.nav-btn {
  flex: 1; padding: 15px; border: none; border-radius: 16px;
  font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800;
  cursor: pointer; transition: transform 0.15s;
}
.nav-btn:active { transform: scale(0.97); }
.nav-btn.prev { background: #f0f6ff; color: var(--primary); }
.nav-btn.next { background: linear-gradient(135deg, var(--primary), var(--green)); color: white; box-shadow: 0 6px 20px rgba(77,150,255,0.3); }

/* ══ FINISH SCREEN ══ */
.finish-wrap { z-index:1; position:relative; width:min(380px,95vw); margin:24px auto 0; }
.finish-card {
  background: white; border-radius: 28px; padding: 40px 24px 32px;
  box-shadow: 0 12px 48px rgba(77,150,255,0.18); text-align: center;
  animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
}
.finish-trophy { font-size: 5rem; display: block; margin-bottom: 12px; }
.finish-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--dark); margin-bottom: 8px; }
.finish-sub { color: #6a8caf; font-size: 1rem; font-weight: 700; margin-bottom: 28px; }
.finish-btns { display: flex; flex-direction: column; gap: 10px; }
.finish-btn {
  width: 100%; padding: 15px; border: none; border-radius: 16px;
  font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800; cursor: pointer;
  transition: transform 0.15s;
}
.finish-btn:active { transform: scale(0.97); }
.finish-btn.primary { background: linear-gradient(135deg, var(--primary), var(--green)); color: white; box-shadow: 0 6px 20px rgba(77,150,255,0.3); }
.finish-btn.secondary { background: #f0f6ff; color: var(--primary); }

/* Stars burst */
.stars-burst { position:fixed; inset:0; pointer-events:none; z-index:200; }
.sp { position:absolute; font-size:1.8rem; animation:burst 1s ease forwards; opacity:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
@keyframes burst {
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2) rotate(var(--rot))}
}
</style>
</head>
<body>

<div class="clouds"><div class="cloud"></div><div class="cloud"></div><div class="cloud"></div></div>
<div class="stars-burst" id="stars-burst"></div>

<!-- ══ HOME ══ -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <h1>📖 Учим слова</h1>
    <p>Выбери тему для изучения</p>
  </div>
  <div class="topics" id="topics-list"></div>
</div>

<!-- ══ LEARN ══ -->
<div class="screen" id="screen-learn">
  <div class="learn-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="learn-title-wrap">
      <div class="learn-topic-name" id="learn-topic-name"></div>
      <div class="learn-counter" id="learn-counter">Слово 1 из 10</div>
    </div>
  </div>

  <div class="prog-wrap"><div class="prog-bar" id="learn-prog" style="width:0%"></div></div>

  <div class="card-scene">
    <div class="flashcard" id="flashcard">
      <div class="word-num" id="word-num">1 / 10</div>

      <!-- Step dots -->
      <div class="step-dots">
        <div class="dot active" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
      </div>

      <!-- Step 1: Word + translation + listen -->
      <div class="step-panel active" id="step-1">
        <div class="word-block">
          <span class="card-emoji" id="card-emoji">👩</span>
          <div class="card-en" id="card-en">mother</div>
          <div class="card-divider"></div>
          <div class="card-ru" id="card-ru">мама</div>
        </div>
        <div class="listen-row">
          <button class="listen-btn" id="listen-btn" onclick="speakWord()">
            <span class="spk" id="spk-icon">🔊</span>
            <span id="listen-label">Нажми и послушай</span>
          </button>
        </div>
        <div class="listen-hint" id="listen-hint" style="text-align:center;font-size:0.8rem;color:#a0b8d0;font-weight:700;margin-top:8px;animation:blink 1.4s ease infinite;">👆 Послушай слово перед тем как идти дальше</div>
      </div>

      <!-- Step 2: Example sentence -->
      <div class="step-panel" id="step-2">
        <div class="example-box">
          <div class="example-label">📝 Пример предложения</div>
          <div class="example-en" id="example-en">My <b>mother</b> is very kind.</div>
          <div class="example-ru" id="example-ru">Моя мама очень добрая.</div>
        </div>
        <div class="listen-again-row">
          <button class="listen-btn" id="listen-btn-2" onclick="speakWord()">
            <span class="spk">🔊</span>
            <span>Послушать слово снова</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-row" style="width:min(380px,95vw);margin:14px auto 0;padding:0 0;">
    <button class="nav-btn prev" id="prev-btn" onclick="prevStep()">← Назад</button>
    <button class="nav-btn next" id="next-btn" onclick="nextStep()" disabled style="opacity:0.4;">Далее →</button>
  </div>
</div>

<!-- ══ FINISH ══ -->
<div class="screen" id="screen-finish">
  <div class="finish-wrap">
    <div class="finish-card">
      <span class="finish-trophy">🎓</span>
      <div class="finish-title" id="finish-title">Тема изучена!</div>
      <div class="finish-sub" id="finish-sub">Ты прошла все слова по теме</div>
      <div class="finish-btns">
        <button class="finish-btn primary" onclick="repeatTopic()">🔄 Повторить тему</button>
        <button class="finish-btn secondary" onclick="goHome()">← К темам</button>
      </div>
    </div>
  </div>
</div>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentTopic = null;
let words = [];
let idx = 0;
let currentStep = 1; // 1 or 2
let hasListened = false;

// ══════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════
function renderHome() {
  const list = document.getElementById('topics-list');
  list.innerHTML = '';

  // Random 30 words card
  const allCard = document.createElement('div');
  allCard.className = 'topic-card all-card';
  allCard.onclick = () => startRandom();
  allCard.innerHTML = `
    <div class="emoji">🎲</div>
    <div class="info">
      <div class="topic-name">Случайные слова</div>
      <div class="topic-meta">30 слов из всех тем · каждый раз новые</div>
    </div>`;
  list.appendChild(allCard);

  TOPICS.forEach(topic => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.onclick = () => startLearn(topic);
    card.innerHTML = `
      <div class="emoji">${topic.emoji}</div>
      <div class="info">
        <div class="topic-name">${topic.name}</div>
        <div class="topic-meta">${topic.words.length} слов</div>
      </div>`;
    list.appendChild(card);
  });
}

function goHome() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  showScreen('home');
}

// ══════════════════════════════════════════
//  LEARN
// ══════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startRandom() {
  const all = TOPICS.reduce((acc, t) => acc.concat(t.words), []);
  const randomWords = shuffle(all).slice(0, 30);
  currentTopic = { id: 'random', name: 'Случайные слова', emoji: '🎲', words: randomWords };
  words = randomWords;
  document.getElementById('learn-topic-name').textContent = '🎲 Случайные слова';
  idx = 0;
  showScreen('learn');
  renderCard();
}

function startLearn(topic) {
  currentTopic = topic;
  words = topic.words;
  document.getElementById('learn-topic-name').textContent = topic.emoji + ' ' + topic.name;
  idx = 0;
  showScreen('learn');
  renderCard();
}

function repeatTopic() {
  idx = 0;
  showScreen('learn');
  renderCard();
}

function renderCard() {
  const w = words[idx];
  const total = words.length;
  currentStep = 1;
  hasListened = false;

  if (window.speechSynthesis) window.speechSynthesis.cancel();

  // Animate card
  const card = document.getElementById('flashcard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardIn 0.45s cubic-bezier(.34,1.56,.64,1) both';

  document.getElementById('word-num').textContent = `${idx + 1} / ${total}`;
  document.getElementById('learn-counter').textContent = `Слово ${idx + 1} из ${total}`;
  document.getElementById('card-en').textContent = w.en;
  document.getElementById('card-ru').textContent = w.ru;
  document.getElementById('example-en').innerHTML = w.ex_en;
  document.getElementById('example-ru').textContent = w.ex_ru;
  document.getElementById('learn-prog').style.width = `${((idx + 1) / total) * 100}%`;

  // Set emoji
  const topicId = currentTopic ? currentTopic.id : null;
  const emojiArr = topicId && TOPIC_EMOJI[topicId] ? TOPIC_EMOJI[topicId] : null;
  const emojiEl = document.getElementById('card-emoji');
  if (emojiArr && emojiArr[idx] !== undefined) {
    emojiEl.textContent = emojiArr[idx];
  } else if (!emojiArr) {
    // All words mode - find topic by word
    let found = '📖';
    for (const t of TOPICS) {
      const wi = t.words.findIndex(ww => ww.en === w.en);
      if (wi !== -1 && TOPIC_EMOJI[t.id] && TOPIC_EMOJI[t.id][wi]) {
        found = TOPIC_EMOJI[t.id][wi]; break;
      }
    }
    emojiEl.textContent = found;
  } else {
    emojiEl.textContent = '📖';
  }

  // Show step 1, hide step 2
  document.getElementById('step-1').classList.add('active');
  document.getElementById('step-2').classList.remove('active');

  // Dots
  document.getElementById('dot-1').className = 'dot active';
  document.getElementById('dot-2').className = 'dot';

  // Reset listen button
  const lb = document.getElementById('listen-btn');
  lb.classList.remove('playing');
  document.getElementById('listen-label').textContent = 'Нажми и послушай';
  document.getElementById('listen-hint').style.display = 'block';

  // Prev button
  document.getElementById('prev-btn').style.opacity = idx === 0 ? '0.4' : '1';
  document.getElementById('prev-btn').disabled = idx === 0;

  // Lock next until listened
  const nb = document.getElementById('next-btn');
  nb.disabled = true;
  nb.style.opacity = '0.4';
  nb.textContent = 'Далее →';

  // No auto-speak — user must press button
}

function speakWord() {
  const word = words[idx].en;
  if (window.speechSynthesis) window.speechSynthesis.cancel();

  const lb = document.getElementById('listen-btn');
  lb.classList.add('playing');
  if (currentStep === 1) document.getElementById('listen-label').textContent = 'Слушай...';

  const done = () => {
    lb.classList.remove('playing');
    if (currentStep === 1) {
      document.getElementById('listen-label').textContent = '🔁 Послушать ещё раз';
      document.getElementById('listen-hint').style.display = 'none';
    }
    // Unlock next after first listen
    if (!hasListened) {
      hasListened = true;
      const nb = document.getElementById('next-btn');
      nb.disabled = false;
      nb.style.opacity = '1';
      nb.style.transition = 'opacity 0.3s';
    }
  };

  if (!window.speechSynthesis) { done(); return; }
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US'; utter.rate = 0.82; utter.pitch = 1.0;
  utter.onend = done; utter.onerror = done;
  try { window.speechSynthesis.speak(utter); } catch(e) { done(); }
}

function nextStep() {
  if (currentStep === 1) {
    // Go to step 2 (example)
    currentStep = 2;
    document.getElementById('step-1').classList.remove('active');
    document.getElementById('step-2').classList.add('active');
    document.getElementById('dot-1').className = 'dot done';
    document.getElementById('dot-2').className = 'dot active';
    const nb = document.getElementById('next-btn');
    nb.textContent = idx >= words.length - 1 ? 'Завершить ✓' : 'Следующее слово →';
    // No auto-speak on step 2
  } else {
    // Go to next word or finish
    if (idx >= words.length - 1) {
      showFinish();
    } else {
      idx++;
      renderCard();
    }
  }
}

function prevStep() {
  if (currentStep === 2) {
    // Go back to step 1
    currentStep = 1;
    document.getElementById('step-2').classList.remove('active');
    document.getElementById('step-1').classList.add('active');
    document.getElementById('dot-1').className = 'dot active';
    document.getElementById('dot-2').className = 'dot';
    const nb = document.getElementById('next-btn');
    nb.textContent = 'Далее →';
    // Already listened so keep unlocked
    nb.disabled = false; nb.style.opacity = '1';
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  } else {
    if (idx > 0) { idx--; renderCard(); }
  }
}

function showFinish() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  const name = currentTopic ? currentTopic.name : 'все слова';
  document.getElementById('finish-title').textContent = currentTopic ? 'Тема изучена! 🎉' : 'Все слова пройдены! 🎉';
  document.getElementById('finish-sub').textContent = `Ты прошла ${words.length} слов — молодец!`;
  showScreen('finish');
  burstStars();
}

// ══════════════════════════════════════════
//  STARS
// ══════════════════════════════════════════
function burstStars() {
  const c = document.getElementById('stars-burst');
  const emojis = ['⭐','🌟','✨','💫','🎉'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.3;
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sp';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const a = Math.random() * 2 * Math.PI, d = 80 + Math.random() * 160;
      el.style.left = cx + 'px'; el.style.top = cy + 'px';
      el.style.setProperty('--tx', `${Math.cos(a)*d}px`);
      el.style.setProperty('--ty', `${Math.sin(a)*d}px`);
      el.style.setProperty('--rot', `${(Math.random()-.5)*360}deg`);
      el.style.animationDuration = (0.8 + Math.random() * 0.5) + 's';
      c.appendChild(el);
      setTimeout(() => el.remove(), 1400);
    }, i * 60);
  }
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderHome();
</script>
